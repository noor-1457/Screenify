<div class="container mt-15 px-4 py-8 items-center">
    <div class="flex justify-center items-center border-b-2 border-red-800 mb-5 ">
        <h1 class="text-white text-3xl font-bold mb-8">All Movies</h1>
    </div>
  
  @if (isLoading) {
    <div class="loading text-white text-center p-8">Loading movies...</div>
  } @else if (movies.length > 0) {
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-3 items-center xl:grid-cols-5 gap-6">
      @for (movie of movies; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else if (!isLoading && movies.length === 0) {
    <div class="no-movies text-white text-center p-8">No movies found</div>
  }
</div>
